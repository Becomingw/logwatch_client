name: Build and Publish to PyPI

on:
  # 仅 tag 推送触发发布（如 v0.1.4、v0.1.5b1）
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          if echo "$VERSION" | grep -qE '(a|b|rc|dev)[0-9]*$'; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update version in pyproject.toml
        run: |
          sed -i "s/^version = .*/version = \"${{ steps.version.outputs.version }}\"/" pyproject.toml
          echo "Updated version to: ${{ steps.version.outputs.version }}"
          grep '^version' pyproject.toml

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Lint with ruff
        run: uv run --with ruff ruff check .

      - name: Run tests
        run: uv run --with pytest pytest

      - name: Build package
        run: uv build

      - name: Store the distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

    outputs:
      prerelease: ${{ steps.version.outputs.prerelease }}
      version: ${{ steps.version.outputs.version }}

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    # 预发布版本（v0.1.5b1, v0.1.5rc1 等）→ TestPyPI
    if: needs.build.outputs.prerelease == 'true'

    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to TestPyPI
        run: uv publish --publish-url https://test.pypi.org/legacy/ dist/*
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.TEST_PYPI_API_TOKEN }}

  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # 正式版本（v0.1.4）→ PyPI
    if: needs.build.outputs.prerelease == 'false'

    steps:
      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        run: uv publish dist/*
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
